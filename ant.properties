project.name=WEB_Lab3
project.version=1.0.0
main.class=com.sshubuntu.weblab3.Main

src.dir=src/main/java
resources.dir=src/main/resources
test.src.dir=src/test/java
web.dir=src/main/webapp
manifest.file=META-INF/MANIFEST.MF
lib.dir=lib

build.dir=build/ant
classes.dir=${build.dir}/classes
test.classes.dir=${build.dir}/test-classes
dist.dir=dist
reports.dir=${build.dir}/reports
xml.report.dir=${reports.dir}/xml
native2ascii.dir=${build.dir}/native2ascii
javadoc.dir=${build.dir}/javadoc
tmp.dir=${build.dir}/tmp

jar.name=${project.name}-${project.version}.jar
war.name=${project.name}.war
alt.jar.name=${project.name}-${project.version}-alt.jar

javac.source=17
javac.target=17
javac.encoding=UTF-8

i18n.includes=**/*.properties
xml.includes=**/*.xml
test.includes=**/*Test.java,**/*Tests.java

scp.host=example.org
scp.port=22
scp.user=user
scp.password=password
scp.remote.path=/tmp/${jar.name}

svn.commit.message=Automated commit from Ant diff/report target
svn.report.message=Add JUnit XML report
diff.excluded.classes.regex=PointAreaService|ResultService

replace.from=ResultService
replace.to=ResultServiceAlt
replaceregexp.match=Point
replaceregexp.replace=Dot

env.java.versions=17,21
env.jvm.args=-Xms128m -Xmx512m
env.program.args=

music.enabled=true

deploy.project.root=/mnt/c/labs/OPI_lab4
deploy.host=84.54.56.227
deploy.ssh.user=sshubuntu
deploy.http.port=23489
deploy.https.port=23488
deploy.context.path=/WEB_Lab3/
deploy.verify.waitsec=30
